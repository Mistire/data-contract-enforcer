# dbt schema.yml — Week 5 Event Sourcing Platform
# Kept in sync with: generated_contracts/week5-event-records.yaml
#
# Contract rules mapped to dbt tests:
#   - not_null        → required: true in Bitol contract
#   - unique          → unique: true in Bitol contract
#   - accepted_values → enum constraint in Bitol contract
#   - dbt_utils.expression_is_true → temporal ordering, monotonic sequence, token math
#
# Run with: dbt test --select week5_events
# Or:       dbt test --select tag:week5

version: 2

models:
  - name: week5_events
    description: >
      Append-only event log from the Week 5 Event Sourcing Platform (The Ledger).
      One record per domain event. Sourced from outputs/week5/events.jsonl.
      Events are immutable — no updates, no deletes.
    meta:
      contract_id: week5-event-records
      contract_version: "1.0.0"
      bitol_yaml: generated_contracts/week5-event-records.yaml
    tags:
      - week5
      - data_contract

    columns:
      # ── Primary key ──────────────────────────────────────────────────────────
      - name: event_id
        description: >
          Primary key. UUIDv4. Globally unique across all events.
          Immutable once written.
        tests:
          - not_null                    # required: true
          - unique                      # no duplicate events
          - dbt_utils.expression_is_true:
              expression: "event_id ~ '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'"
              config:
                severity: error
              meta:
                contract_clause: "format: uuid"

      # ── Event classification ─────────────────────────────────────────────────
      - name: event_type
        description: >
          PascalCase event type name. Must be registered in the event schema registry.
          Examples: ApplicationSubmitted, DocumentUploaded, DecisionGenerated.
        tests:
          - not_null                    # required: true
          - dbt_utils.expression_is_true:
              expression: "event_type ~ '^[A-Z][a-zA-Z]+$'"
              config:
                severity: warn
              meta:
                contract_clause: "PascalCase — registered in event schema registry"

      - name: aggregate_type
        description: >
          PascalCase aggregate type. Derived from stream_id prefix.
          Examples: Loan, Docpkg, Agentsession, Compliance.
        tests:
          - not_null                    # required: true

      - name: aggregate_id
        description: >
          Identifier for the aggregate instance. Derived from stream_id suffix.
          NOTE: In the Week 5 implementation this is a business key (e.g. APEX-0001),
          not a UUID. This is a documented schema deviation — see ACTUAL_SCHEMAS.md.
        tests:
          - not_null                    # required: true
          # UUID test intentionally omitted — aggregate_id uses business keys in this impl.
          # See DOMAIN_NOTES.md Q5 for deviation documentation.

      # ── Sequence integrity ───────────────────────────────────────────────────
      - name: sequence_number
        description: >
          Monotonically increasing integer per aggregate_id. No gaps, no duplicates
          within a single aggregate stream. This is the primary ordering guarantee
          of the event store.
        tests:
          - not_null                    # required: true
          - dbt_utils.expression_is_true:
              expression: "sequence_number >= 1"
              config:
                severity: error
              meta:
                contract_clause: "minimum: 1, monotonically increasing per aggregate_id"

      # ── Temporal ordering ────────────────────────────────────────────────────
      - name: occurred_at
        description: >
          ISO 8601 timestamp when the event occurred in the domain.
          Sentinel: set equal to recorded_at (Week 5 PostgreSQL schema has no occurred_at).
          MUST be <= recorded_at.
        tests:
          - not_null                    # required: true
          - dbt_utils.expression_is_true:
              expression: "occurred_at::timestamp <= recorded_at::timestamp"
              config:
                severity: error
                error_if: ">0"
              meta:
                contract_clause: "occurred_at <= recorded_at (temporal ordering invariant)"

      - name: recorded_at
        description: >
          ISO 8601 timestamp when the event was persisted to the store.
          Must be >= occurred_at.
        tests:
          - not_null                    # required: true
          - dbt_utils.expression_is_true:
              expression: "recorded_at::timestamp >= occurred_at::timestamp"
              config:
                severity: error
              meta:
                contract_clause: "recorded_at >= occurred_at"

      # ── Schema versioning ────────────────────────────────────────────────────
      - name: schema_version
        description: >
          Semantic version of the event schema. Format: "N.0" (e.g. "1.0", "2.0").
          Derived from event_version integer during migration.
        tests:
          - not_null                    # required: true
          - dbt_utils.expression_is_true:
              expression: "schema_version ~ '^[0-9]+\\.0$'"
              config:
                severity: warn
              meta:
                contract_clause: "pattern: ^[0-9]+\\.0$ (semver major only)"

      # ── Metadata fields ──────────────────────────────────────────────────────
      - name: metadata__correlation_id
        description: >
          Correlation ID linking causally related events across aggregates.
          Must be a UUIDv4.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "metadata__correlation_id ~ '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'"
              config:
                severity: warn
              meta:
                contract_clause: "metadata.correlation_id: format: uuid"

      - name: metadata__source_service
        description: >
          Name of the service that produced this event.
          Sentinel: 'unknown' when source service is not recorded.
        tests:
          - not_null

  # ── Monotonic sequence check (aggregate-level) ───────────────────────────────
  # dbt doesn't have a built-in monotonic test; use a custom generic test or
  # dbt_utils.sequential_values as a proxy. The test below checks for gaps
  # within each aggregate stream using a window function.
  - name: week5_sequence_integrity
    description: >
      Audit view that flags sequence number violations within each aggregate stream.
      A violation occurs when sequence_number is not exactly previous + 1.
      This model should return zero rows when the event store is healthy.
    meta:
      contract_id: week5-event-records
      contract_clause: "sequence_number monotonically increasing per aggregate_id"
    tags:
      - week5
      - data_contract
      - audit

    columns:
      - name: event_id
        description: The event_id of the record with a sequence gap.
        tests:
          - not_null

      - name: aggregate_id
        description: The aggregate stream where the gap was detected.
        tests:
          - not_null

      - name: sequence_number
        description: The out-of-order sequence number.
        tests:
          - not_null

      - name: expected_sequence
        description: The sequence number that was expected (previous + 1).
        tests:
          - not_null

      - name: gap_size
        description: >
          Difference between actual and expected sequence number.
          Positive = gap (missing events). Negative = duplicate or reorder.
        tests:
          - dbt_utils.expression_is_true:
              expression: "gap_size = 0"
              config:
                severity: error
                error_if: ">0"
              meta:
                contract_clause: "sequence_number has no gaps or duplicates per aggregate_id"


# ── Sources ───────────────────────────────────────────────────────────────────
# Define the raw JSONL files as dbt sources so models can reference them.

sources:
  - name: week3_raw
    description: Raw Week 3 Document Refinery outputs (post-migration canonical JSONL).
    meta:
      contract_id: week3-document-refinery-extractions
    tables:
      - name: extractions
        description: Canonical extraction_record JSONL loaded as a dbt seed or external table.
        identifier: extractions
        meta:
          file_path: outputs/week3/extractions.jsonl
          format: jsonl
        columns:
          - name: doc_id
            tests:
              - not_null
              - unique
          - name: extracted_facts
            description: Array of extracted facts — explode to week3_extracted_facts model.

  - name: week5_raw
    description: Raw Week 5 Event Sourcing Platform outputs (post-migration canonical JSONL).
    meta:
      contract_id: week5-event-records
    tables:
      - name: events
        description: Canonical event_record JSONL loaded as a dbt seed or external table.
        identifier: events
        meta:
          file_path: outputs/week5/events.jsonl
          format: jsonl
        columns:
          - name: event_id
            tests:
              - not_null
              - unique
          - name: occurred_at
            tests:
              - not_null
          - name: recorded_at
            tests:
              - not_null
