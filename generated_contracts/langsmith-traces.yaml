kind: DataContract
apiVersion: v3.0.0
id: langsmith-traces
info:
  title: langsmith-traces
  version: 1.0.0
  owner: data-contract-enforcer
servers:
  local:
    type: local
    path: outputs/traces/runs.jsonl
    format: jsonl
schema:
  id:
    type: string
    required: true
    llm_annotation: A unique identifier for each trace.
  name:
    type: string
    required: true
    llm_annotation: A descriptive name assigned to the trace, indicating its purpose
      or function.
  run_type:
    type: string
    required: true
  inputs.prompt:
    type: string
    required: true
    llm_annotation: The textual input or query provided to the language model.
  outputs.result:
    type: string
    required: true
    llm_annotation: The text generated by the language model in response to the input
      prompt.
  error:
    type: string
    required: false
    llm_annotation: Details of any errors encountered during the trace execution.
  start_time:
    type: string
    required: true
  end_time:
    type: string
    required: true
  total_tokens:
    type: integer
    required: true
  prompt_tokens:
    type: integer
    required: true
  completion_tokens:
    type: integer
    required: true
  total_cost:
    type: number
    required: true
    warning_annotation: 'Suspicious distribution: mean=0.0149 is near 0 or 1. Verify
      if this should be a boolean or if data is clamped.'
  parent_run_id:
    type: string
    required: false
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  session_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  tags:
    type: string
    required: true
    llm_annotation: User-defined labels or keywords associated with the trace for
      categorization and filtering.
lineage:
  upstream: []
  downstream: []
