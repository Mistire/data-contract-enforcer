kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: week3-document-refinery-extractions
  version: 1.0.0
  owner: data-contract-enforcer
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
schema:
  doc_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  source_path:
    type: string
    required: true
  source_hash:
    type: string
    required: true
  extraction_model:
    type: string
    required: true
  processing_time_ms:
    type: integer
    required: true
  token_count.input:
    type: integer
    required: true
  token_count.output:
    type: integer
    required: true
  extra_metadata:
    type: string
    required: true
  extracted_at:
    type: string
    required: true
    format: date-time
  extracted_facts.fact_id:
    type: string
    required: false
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  extracted_facts.text:
    type: string
    required: false
  extracted_facts.confidence:
    type: number
    required: false
    minimum: 0.0
    maximum: 1.0
    description: Confidence score. Must remain 0.0-1.0 float. BREAKING if changed
      to 0-100.
  extracted_facts.page_ref:
    type: number
    required: false
  extracted_facts.source_excerpt:
    type: string
    required: false
lineage:
  upstream: []
  downstream:
  - id: file::src/week4/cartographer.py
    fields_consumed:
    - doc_id
    - extracted_facts
  - id: pipeline::week4-lineage-generation
    fields_consumed:
    - doc_id
    - extracted_facts
  - id: file::src/week3/extractor.py
    fields_consumed:
    - doc_id
    - extracted_facts
