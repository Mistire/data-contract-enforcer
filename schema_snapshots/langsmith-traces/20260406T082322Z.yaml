contract_id: langsmith-traces
captured_at: '2026-04-06T08:23:22.480051+00:00'
schema:
  id:
    type: string
    required: true
    llm_annotation: A unique identifier for each trace.
  name:
    type: string
    required: true
    llm_annotation: The descriptive name assigned to the trace or associated run.
  run_type:
    type: string
    required: true
  inputs.prompt:
    type: string
    required: true
    llm_annotation: The input prompt provided to the language model.
  outputs.result:
    type: string
    required: true
    llm_annotation: The text-based result or output generated by the language model.
  error:
    type: string
    required: false
    llm_annotation: Details about any error encountered during the execution of the
      trace.
  start_time:
    type: string
    required: true
  end_time:
    type: string
    required: true
  total_tokens:
    type: integer
    required: true
  prompt_tokens:
    type: integer
    required: true
  completion_tokens:
    type: integer
    required: true
  total_cost:
    type: number
    required: true
    warning_annotation: 'Suspicious distribution: mean=0.0149 is near 0 or 1. Verify
      if this should be a boolean or if data is clamped.'
  parent_run_id:
    type: string
    required: false
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  session_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  tags:
    type: string
    required: true
    llm_annotation: User-defined labels or keywords used to categorize and filter
      traces.
